<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova — history</title>
    <link rel="icon" href="./assets/nova-fruit-logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./nova-fonts.css?v=2" />
    <link rel="stylesheet" href="./styles.css?v=2" />
  </head>
  <body>
    <div class="app-top-nav-wrap">
      <div class="app-top-nav">
        <a class="brand-lockup" href="./index.html" aria-label="Nova home">
          <img class="app-logo app-logo--nav" src="./assets/nova-fruit-logo.svg" width="36" height="36" alt="" />
          <span class="brand-mark">Nova</span>
        </a>
        <nav class="app-top-links" aria-label="Related pages">
          <a href="./index.html">App</a>
          <a href="./recommendations.html">Recommendations</a>
          <a href="./showcase.html">Project write-up</a>
        </nav>
        <span></span>
      </div>
    </div>

    <main class="app-shell">
      <section class="panel">
        <h2>History</h2>
        <p class="lookup-note">Recent scans, searches, barcode lookups, and meal-log actions.</p>
        <div id="historyList" class="meal-timeline"></div>
      </section>
    </main>

    <script>
      const HISTORY_KEY = "novaActionHistory";
      const list = document.getElementById("historyList");

      function fmtTime(ts) {
        return new Date(ts).toLocaleString(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        });
      }

      function getHistory() {
        const raw = localStorage.getItem(HISTORY_KEY);
        if (!raw) return [];
        try {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      const history = getHistory();
      if (history.length === 0) {
        const p = document.createElement("p");
        p.className = "empty-state";
        p.textContent = "No history yet. Use the app and actions will appear here.";
        list.append(p);
      } else {
        for (const item of history) {
          const wrap = document.createElement("div");
          wrap.className = "meal-group";
          const title = document.createElement("h3");
          title.textContent = item.title || item.type || "Action";
          const meta = document.createElement("p");
          meta.className = "meal-meta";
          meta.textContent = item.details ? `${item.details} • ${fmtTime(item.createdAt)}` : fmtTime(item.createdAt);
          wrap.append(title, meta);
          list.append(wrap);
        }
      }
    </script>
  </body>
</html>
